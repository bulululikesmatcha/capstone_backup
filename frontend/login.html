<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TUBIGTALA - Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        html {
            scroll-behavior: smooth;
        }
        @keyframes slideInDown {
            from { opacity: 0; transform: translateY(-30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-slideInDown { animation: slideInDown 0.8s ease-out; }
    </style>
</head>
<body class="bg-gradient-to-r from-blue-600 to-cyan-500 min-h-screen flex items-center justify-center">

    <!-- Login Form Container -->
    <div class="bg-white rounded-xl shadow-xl w-md max-w-md p-8 animate-slideInDown">
        <h1 class="text-3xl font-bold text-blue-600 text-center mb-6">TUBIGTALA Login</h1>
        <p class="text-center text-gray-600 mb-8">Enter your credentials to access your account</p>

        <!-- Demo Credentials Alert -->
        <div class="bg-yellow-50 border-l-4 border-yellow-400 p-3 mb-6 text-sm">
            <p class="font-semibold text-yellow-800">Demo Accounts:</p>
            <p class="text-yellow-700"><strong>Customer:</strong> 12345 / demo1234</p>
            <p class="text-yellow-700"><strong>Water Reader:</strong> reader01 / reader123</p>
            <p class="text-yellow-700"><strong>Administrator:</strong> admin01 / admin123</p>
        </div>

        <form id="loginForm" class="space-y-6">
            <!-- Client Number -->
            <div>
                <label for="clientnumber" class="block text-gray-700 font-semibold mb-2">Client Number</label>
                <input type="text" id="clientnumber" placeholder="Enter your client number"
                    class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:outline-none transition duration-200" required>
            </div>

            <!-- Password -->
            <div>
                <label for="password" class="block text-gray-700 font-semibold mb-2">Password</label>
                <input type="password" id="password" placeholder="Enter your password"
                    class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:outline-none transition duration-200" required>
            </div>

            <!-- Error Message -->
            <div id="errorMessage" class="hidden bg-red-50 border border-red-300 text-red-700 px-4 py-3 rounded-lg text-sm"></div>

            <!-- Remember Me & Forgot Password -->
            <div class="flex items-center justify-between text-sm text-gray-600">
                <label class="flex items-center gap-2">
                    <input type="checkbox" id="remember" class="w-4 h-4 text-blue-600 border-gray-300 rounded focus:ring-blue-500">
                    Remember Me
                </label>
                <a href="landing page.html" class="hover:text-blue-600">Back to Home</a>
            </div>

            <!-- Submit Button -->
            <button type="submit"
                class="w-full bg-blue-600 text-white font-semibold py-3 rounded-lg hover:bg-blue-700 transition duration-200 shadow-lg">Login</button>
        </form>
       
    </div>

    <script>
        // Dummy account credentials
        const DEMO_CUSTOMER = "12345";
        const DEMO_CUSTOMER_PASS = "demo1234";
        const DEMO_CUSTOMER_USER = {
            clientNumber: "12345",
            name: "John Doe",
            email: "john.doe@test.com",
            accountType: "Residential Customer",
            role: "customer"
        };

        const DEMO_READER = "reader01";
        const DEMO_READER_PASS = "reader123";
        const DEMO_READER_USER = {
            clientNumber: "reader01",
            name: "Maria Santos",
            email: "maria.santos@powasa.gov.ph",
            accountType: "Water Meter Reader",
            role: "water_reader",
            zone: "Zone A - Barangay 1-5"
        };

        const DEMO_ADMIN = "admin01";
        const DEMO_ADMIN_PASS = "admin123";
        const DEMO_ADMIN_USER = {
            clientNumber: "admin01",
            name: "Administrator",
            email: "admin@powasa.gov.ph",
            accountType: "Administrator",
            role: "admin",
            zone: "Zone A - Barangay 1-5"
        };

        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const clientNumber = document.getElementById('clientnumber').value;
            const password = document.getElementById('password').value;
            const errorMessage = document.getElementById('errorMessage');
            const remember = document.getElementById('remember').checked;

            // Reset error message
            errorMessage.classList.add('hidden');

            let loginData = null;
            let redirectPage = 'homedashboard.html';

            // Validate credentials
            if (clientNumber === DEMO_CUSTOMER && password === DEMO_CUSTOMER_PASS) {
                loginData = DEMO_CUSTOMER_USER;
                redirectPage = 'homedashboard.html';
            } else if (clientNumber === DEMO_READER && password === DEMO_READER_PASS) {
                loginData = DEMO_READER_USER;
                redirectPage = 'reader-home.html';
            } else if (clientNumber === DEMO_ADMIN && password === DEMO_ADMIN_PASS) {
                loginData = DEMO_ADMIN_USER;
                redirectPage = 'admin-dashboard.html';
            }

            if (loginData) {
                // Store login data in localStorage
                const storedData = {
                    ...loginData,
                    loginTime: new Date().toISOString(),
                    isLoggedIn: true
                };
                localStorage.setItem('tubigtalaUser', JSON.stringify(storedData));
                
                if (remember) {
                    localStorage.setItem('tubigtalaRemember', 'true');
                }

                // Redirect to appropriate dashboard
                window.location.href = redirectPage;
            } else {
                // Show error message
                errorMessage.classList.remove('hidden');
                errorMessage.textContent = 'Invalid client number or password. Please try again.';
            }
        });

        // Check if already logged in
        window.addEventListener('load', function() {
            const user = localStorage.getItem('tubigtalaUser');
            if (user) {
                const userData = JSON.parse(user);
                let redirectPage = 'homedashboard.html';
                if (userData.role === 'water_reader') {
                    redirectPage = 'reader-home.html';
                } else if (userData.role === 'admin') {
                    redirectPage = 'admin-dashboard.html';
                }
                window.location.href = redirectPage;
            }
        });
    </script>

</body>
</html>
